<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 300">
  <!-- Polkadot Logo - Pink dots -->
  <g fill="#E6007A">
    <!-- Main center dot -->
    <ellipse cx="150" cy="150" rx="55" ry="55"/>
    <!-- Top dot -->
    <ellipse cx="150" cy="45" rx="35" ry="30"/>
    <!-- Bottom dot -->
    <ellipse cx="150" cy="255" rx="35" ry="30"/>
    <!-- Upper left dot -->
    <ellipse cx="60" cy="90" rx="32" ry="28"/>
    <!-- Upper right dot -->
    <ellipse cx="240" cy="90" rx="32" ry="28"/>
    <!-- Lower left dot -->
    <ellipse cx="60" cy="210" rx="32" ry="28"/>
    <!-- Lower right dot -->
    <ellipse cx="240" cy="210" rx="32" ry="28"/>
  </g>
  
  <!-- POLKADOT Text - White -->
  <text x="320" y="185" font-family="Arial, sans-serif" font-size="130" font-weight="bold" fill="#FFFFFF" letter-spacing="8">POLKADOT</text>
</svg>
